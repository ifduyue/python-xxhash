name: test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.13t"
          - "3.14"
          - "3.14t"
          - "3.15.0-beta.2"
          - "pypy3.9"
          - "pypy3.10"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -U pip 'setuptools>=45' pytest pytest-codspeed

      - name: Run tests
        run: |
          python setup.py build_ext --inplace
          python -m unittest discover -vv tests
          ./bench.sh

  test_s390x:
    name: Test on big-endian s390x
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Run tests on s390x
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: s390x
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update -q -y
            apt-get install -q -y python3 python3-dev python3-pip build-essential
          run: |
            python3 -c "import sys; assert sys.byteorder == 'big'; print('byteorder:', sys.byteorder)"
            python3 -m pip install --upgrade pip 'setuptools>=45' pytest
            python3 setup.py build_ext --inplace
            python3 -m unittest discover -vv tests
